version: "3.8"
services:
  frontend:
    container_name: frontend
    build: ./react-app1
    ports:
      - "5173:5173"
    restart: unless-stopped

  backend:
    container_name: backend
    build: ./node-app1
    ports:
      - "5000:5000"
    restart: unless-stopped

  nginx:
    image: nginx
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf